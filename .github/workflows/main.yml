name: Clear Deployments

on:
  workflow_dispatch: # Allows you to run this manually

 Force standard permissions to allow deleting deployment history
permissions:
  deployments: write
  contents: write

jobs:
  delete-deployments:
    runs-on: ubuntu-latest
    steps:
      - name: Delete all deployments via GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          owner_repo="${{ github.repository }}"
          echo "Fetching deployments for $owner_repo..."
          
          # 1. Get all deployment IDs
          deployments=$(gh api repos/$owner_repo/deployments --jq '.[].id')
          
          if [ -z "$deployments" ]; then
            echo "No deployments found to delete."
            exit 0
          fi
          
          # 2. Loop through and delete each one
          for id in $deployments; do
            echo "Processing deployment ID: $id"
            
            # Set to inactive first (GitHub requires this before deletion)
            gh api -X POST repos/$owner_repo/deployments/$id/statuses -f state=inactive || true
            
            # Delete it
            gh api -X DELETE repos/$owner_repo/deployments/$id
            echo "Successfully deleted deployment ID: $id"
          done
